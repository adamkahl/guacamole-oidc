name: Build & Push Guacamole

on:
  schedule:
    - cron: "0 3 * * *"   # nightly
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🔍 Get latest Guacamole version
      - name: Get latest version
        run: |
          VERSION=$(curl -s https://downloads.apache.org/guacamole/ | \
            grep -Eo 'href="[0-9]+\.[0-9]+\.[0-9]+/' | \
            grep -Eo '[0-9]+\.[0-9]+\.[0-9]+' | \
            sort -V | tail -n1)

          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Using version: $VERSION"

      # 📦 Download matching OpenID extension
      - name: Download OpenID extension
        run: |
          curl -L -o sso.tar.gz \
          https://downloads.apache.org/guacamole/${VERSION}/binary/guacamole-auth-sso-${VERSION}.tar.gz

          tar -xzf sso.tar.gz
          cp guacamole-auth-sso-${VERSION}/openid/*.jar .

      # 🔐 Login to GHCR
      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
          -u ${{ github.actor }} --password-stdin

      # 🏗 Build image
      - name: Build
        run: |
          docker build \
            --build-arg GUAC_VERSION=${VERSION} \
            -t ghcr.io/${{ github.repository_owner }}/guacamole-oidc:${VERSION} \
            -t ghcr.io/${{ github.repository_owner }}/guacamole-oidc:latest \
            .

      # 🚀 Push image
      - name: Push
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/guacamole-oidc:${VERSION}
          docker push ghcr.io/${{ github.repository_owner }}/guacamole-oidc:latest